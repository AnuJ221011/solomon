services:
  - type: web
    name: solomon-bharat-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: solomon-bharat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: solomon-bharat-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Set CLIENT_URL to your Vercel frontend URL after first deploy
      - key: CLIENT_URL
        sync: false
      # Cloudinary — get from cloudinary.com/console
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Resend email — get from resend.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@solomonbharat.com
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      - key: OTP_MAX_ATTEMPTS
        value: "3"

  - type: redis
    name: solomon-bharat-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: solomon-bharat-db
    databaseName: solomon_bharat
    plan: free
